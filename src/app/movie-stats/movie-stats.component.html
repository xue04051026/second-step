<mat-card class="stats-card">
  <mat-card-header>
    <mat-card-title>电影统计信息</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <div class="stats-item">
      <span class="stats-label">影库总片量:</span>
      <span class="stats-value">{{ totalMovies }}</span>
    </div>
    <div class="stats-item">
      <span class="stats-label">已观影比例:</span>
      <div class="progress-container">
        <mat-progress-bar 
          mode="determinate" 
          [value]="watchedPercentage"
          class="progress-bar"
        ></mat-progress-bar>
        <span class="progress-text">{{ watchedPercentage.toFixed(0) }}%</span>
      </div>
    </div>
    <div class="stats-item">
      <span class="stats-label">平均评分:</span>
      <span class="stats-value">{{ averageRating }}</span>
    </div>
  </mat-card-content>
</mat-card>
